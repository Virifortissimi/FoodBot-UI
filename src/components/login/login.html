<div class="min-h-screen flex bg-white">
    <!-- Left Side - Image -->
    <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-teal-900">
        <div
            class="absolute inset-0 bg-[url('https://images.pexels.com/photos/1640777/pexels-photo-1640777.jpeg')] bg-cover bg-center opacity-60 mix-blend-overlay">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-teal-900/90 via-teal-900/50 to-transparent"></div>

        <div class="relative z-10 p-16 flex flex-col justify-between h-full text-white">
            <div>
                <a routerLink="/"
                    class="inline-flex items-center gap-2 text-white/80 hover:text-white transition-colors">
                    <span class="text-2xl font-bold tracking-tight">FoodBot</span>
                </a>
            </div>

            <div class="max-w-md">
                <h2 class="text-4xl font-bold mb-6 leading-tight">Rediscover the art of African cooking</h2>
                <p class="text-teal-100 text-lg leading-relaxed">
                    Join thousands of food enthusiasts exploring traditional recipes with modern nutrition science.
                </p>
            </div>

            <div class="flex gap-2">
                <div class="w-12 h-1 bg-white rounded-full"></div>
                <div class="w-2 h-1 bg-white/30 rounded-full"></div>
                <div class="w-2 h-1 bg-white/30 rounded-full"></div>
            </div>
        </div>
    </div>

    <!-- Right Side - Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-16 relative">
        <a routerLink="/" class="absolute top-8 right-8 text-gray-400 hover:text-gray-900 lg:hidden">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </a>

        <div class="w-full max-w-md space-y-8 animate-fade-in-up">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h1>
                <p class="text-gray-500">Please details to continue.</p>
            </div>

            <form (ngSubmit)="onSubmit()" class="space-y-6">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email address</label>
                        <div class="relative">
                            <input type="text" [(ngModel)]="email" name="email"
                                class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all outline-none"
                                placeholder="Enter your email" required />
                            <div
                                class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-medium text-gray-700">Password</label>
                            <a href="#" class="text-sm font-semibold text-teal-600 hover:text-teal-500">Forgot
                                password?</a>
                        </div>
                        <input type="password" [(ngModel)]="password" name="password"
                            class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all outline-none"
                            placeholder="••••••••" required />
                    </div>
                </div>

                <div *ngIf="error" class="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    {{ error }}
                </div>

                <button type="submit" [disabled]="loading"
                    class="w-full py-4 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 transition-all shadow-lg shadow-teal-600/20 disabled:opacity-70 disabled:cursor-not-allowed transform hover:-translate-y-0.5">
                    {{ loading ? 'Signing in...' : 'Sign in' }}
                </button>
            </form>

            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-100"></div>
                </div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">Or continue
                        with</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center gap-2 px-6 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    <span class="text-sm font-semibold text-gray-700">Google</span>
                </button>
                <button
                    class="flex items-center justify-center gap-2 px-6 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
                    <img src="https://www.svgrepo.com/show/475647/apple-color.svg" class="w-5 h-5" alt="Apple">
                    <span class="text-sm font-semibold text-gray-700">Apple</span>
                </button>
            </div>

            <p class="text-center text-sm text-gray-500">
                Don't have an account?
                <a routerLink="/signup" class="font-bold text-teal-600 hover:text-teal-500 transition-colors">Sign up
                    for free</a>
            </p>

            <div class="text-center">
                <p class="text-xs text-gray-400 bg-gray-50 inline-block px-3 py-1 rounded-full">Demo: admin / admin</p>
            </div>
        </div>
    </div>
</div>
