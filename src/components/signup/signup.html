<div class="min-h-screen flex bg-white">
    <!-- Right Side - Image order-2 for flex-row-reverse logic on lg screens -->
    <div class="hidden lg:flex lg:w-1/2 lg:order-2 relative overflow-hidden bg-teal-900">
        <div
            class="absolute inset-0 bg-[url('https://images.pexels.com/photos/1128678/pexels-photo-1128678.jpeg')] bg-cover bg-center opacity-60 mix-blend-overlay">
        </div>
        <div class="absolute inset-0 bg-gradient-to-b from-teal-900/90 via-teal-900/50 to-transparent"></div>

        <div class="relative z-10 p-16 flex flex-col justify-between h-full text-white">
            <div class="flex justify-end">
                <a routerLink="/"
                    class="inline-flex items-center gap-2 text-white/80 hover:text-white transition-colors">
                    <span class="text-2xl font-bold tracking-tight">FoodBot</span>
                </a>
            </div>

            <div class="max-w-md">
                <h2 class="text-4xl font-bold mb-6 leading-tight">Start your culinary journey today</h2>
                <p class="text-teal-100 text-lg leading-relaxed">
                    Create an account to get personalized meal plans, nutritional advice, and access to our community.
                </p>
            </div>

            <div class="flex gap-2">
                <div class="w-2 h-1 bg-white/30 rounded-full"></div>
                <div class="w-12 h-1 bg-white rounded-full"></div>
                <div class="w-2 h-1 bg-white/30 rounded-full"></div>
            </div>
        </div>
    </div>

    <!-- Left Side - Form -->
    <div class="w-full lg:w-1/2 lg:order-1 flex items-center justify-center p-8 lg:p-16 relative">
        <a routerLink="/" class="absolute top-8 left-8 text-gray-400 hover:text-gray-900 lg:hidden">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </a>

        <div class="w-full max-w-md space-y-8 animate-fade-in-up">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Create an account</h1>
                <p class="text-gray-500">Join FoodBot Africa for free.</p>
            </div>

            <form (ngSubmit)="onSubmit()" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" [(ngModel)]="fullName" name="fullName"
                        class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all outline-none"
                        placeholder="Enter your full name" required />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email address</label>
                    <input type="email" [(ngModel)]="email" name="email"
                        class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all outline-none"
                        placeholder="Enter your email" required />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" [(ngModel)]="password" name="password"
                            class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all outline-none"
                            placeholder="Min 8 chars" required />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm</label>
                        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                            class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10 transition-all outline-none"
                            placeholder="Repeat password" required />
                    </div>
                </div>

                <div *ngIf="error" class="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    {{ error }}
                </div>

                <div class="flex items-start gap-3">
                    <input id="terms" type="checkbox"
                        class="mt-1 w-4 h-4 text-teal-600 border-gray-300 rounded focus:ring-teal-500">
                    <label for="terms" class="text-sm text-gray-500">
                        By creating an account, you agree to our <a href="#" class="text-teal-600 hover:underline">Terms
                            of Service</a> and <a href="#" class="text-teal-600 hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" [disabled]="loading"
                    class="w-full py-4 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 transition-all shadow-lg shadow-teal-600/20 disabled:opacity-70 disabled:cursor-not-allowed transform hover:-translate-y-0.5">
                    {{ loading ? 'Creating account...' : 'Create Account' }}
                </button>
            </form>

            <p class="text-center text-sm text-gray-500">
                Already have an account?
                <a routerLink="/login" class="font-bold text-teal-600 hover:text-teal-500 transition-colors">Sign in</a>
            </p>
        </div>
    </div>
</div>
